<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Circle Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="inner-page">
    <nav>
      <a href="/index.html" id="logo"
        ><img src="/images/logos/circle.svg" alt="Circle Agency Logo"
      /></a>
      <div class="nav-content">
        <ul class="menu">
          <li><a href="/index.html">Home</a></li>
          <li><a href="">Projects</a></li>
          <li><a href="">Services</a></li>
        </ul>
        <a href="" id="contact-btn">Contact Us</a>
      </div>
      <div class="mobile-menu">
        <button class="menu-toggle" id="mobile-menu">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </div>
    </nav>

    <section class="contact-section">
      <div class="contact-container">
        <h1>Contact Us</h1>
        <form class="contact-form" id="contactForm">
          <div class="form-group">
            <label for="full-name">Full Name</label>
            <input
              type="text"
              id="full-name"
              name="full-name"
              placeholder="Enter your full name"
              data-field="NAME"
            />
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              data-field="EMAIL"
            />
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Enter your phone number"
              data-field="PHONE"
            />
            <span class="error-message"></span>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Enter your message"
              rows="6"
              data-field="MESSAGE"
            ></textarea>
            <span class="error-message"></span>
          </div>

          <button type="submit" class="submit-btn" id="contact-sub-btn">
            Submit
          </button>
        </form>
      </div>
    </section>

    <footer>
      <div class="footer-info">
        <img src="/images/logos/circle.svg" alt="logo Circle Agency" />
        <p>2972 Westheimer Rd. Santa Ana, Illinois 85486</p>
      </div>
      <div class="footer-services">
        <ul class="site-map">
          <li><a href="">Team</a></li>
          <li><a href="">Services</a></li>
          <li><a href="">About Us</a></li>
          <li><a href="">Press</a></li>
          <li><a href="">Projects</a></li>
          <li><a href="">Privacy Policy</a></li>
        </ul>
      </div>
    </footer>

    <script src="/js/contact.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
